<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Details | FUNGEP</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Space Grotesk', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    body {
      background: linear-gradient(135deg, #00adef 0%, #0076e5 100%);
      min-height: 100vh;
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>

<body class="flex items-start justify-center px-4 py-12 md:py-20">

<div class="w-full max-w-3xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">

  <!-- HEADER -->
  <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-8 py-10">
    <h1 id="test-name" class="text-3xl md:text-5xl font-black text-white uppercase">
      Loading...
    </h1>
  </div>

  <div class="px-8 py-10 md:px-12 space-y-10">

    <!-- PATTERN -->
    <section>
      <h2 class="text-base font-black text-slate-900 mb-4">Test Pattern</h2>

      <table class="w-full text-sm">
        <thead class="text-slate-400 uppercase font-bold">
          <tr>
            <th class="text-left">Subject</th>
            <th class="text-center">MCQs</th>
            <th class="text-center">Marks</th>
          </tr>
        </thead>

        <tbody id="pattern-table-body"></tbody>
        <tfoot id="pattern-table-footer" class="font-bold text-blue-600"></tfoot>
      </table>
    </section>

    <!-- STRATEGY -->
    <section>
      <h2 class="text-base font-black text-slate-900 mb-4">Preparation Strategy</h2>
      <p id="prep-guide" class="text-slate-700"></p>
    </section>

    <!-- SCHEDULE -->
    <section>
      <h2 class="text-base font-black text-slate-900 mb-4">Schedule</h2>
      <div id="dates-container" class="grid gap-3"></div>
    </section>

    <!-- CENTERS -->
    <section>
      <h2 class="text-base font-black text-slate-900 mb-4">Test Centers</h2>
      <div id="centers-container" class="flex flex-wrap gap-2"></div>
    </section>

  </div>
</div>

<script>
window.onload = () => {

  const params = new URLSearchParams(window.location.search);
  const id = params.get('id') || "net-nust";

  fetch('tests.json')
    .then(res => res.json())
    .then(data => {

      const current = data.tests.find(t => t.id === id);

      if (!current) {
        document.getElementById('test-name').innerText = "Test Not Found";
        return;
      }

      // ================= HEADER =================
      document.getElementById('test-name').innerText = current.short;

      // ================= PATTERN =================
      let totalM = 0, totalP = 0;

      document.getElementById('pattern-table-body').innerHTML =
        current.pattern.map(p => {
          totalM += p.mcqs;
          totalP += p.marks;

          return `
            <tr>
              <td class="py-2 font-semibold">${p.subject}</td>
              <td class="text-center">${p.mcqs}</td>
              <td class="text-center text-blue-600 font-bold">${p.marks}</td>
            </tr>
          `;
        }).join('');

      document.getElementById('pattern-table-footer').innerHTML =
        `<tr>
          <td>Total</td>
          <td class="text-center">${totalM}</td>
          <td class="text-center">${totalP}</td>
        </tr>`;

      // ================= STRATEGY =================
      document.getElementById('prep-guide').innerText = current.strategy;

      // ================= SCHEDULE (FIXED) =================
      document.getElementById('dates-container').innerHTML =
        current.annualSchedule.map(d => `
          <div class="p-5 bg-slate-50 rounded-xl border">

            <p class="text-sm font-black text-blue-600 uppercase mb-3">
              ${d.series}
            </p>

            <div class="grid grid-cols-2 gap-y-2 text-sm">

              <span class="text-slate-400 uppercase">Registration Opens</span>
              <span class="text-right text-slate-700">${d.regStarts}</span>

              <span class="text-slate-400 uppercase">Deadline</span>
              <span class="text-right text-slate-700">${d.deadline}</span>

              <span class="text-slate-400 uppercase">Test Date</span>
              <span class="text-right text-slate-700">${d.testDate}</span>

            </div>

          </div>
        `).join('');

      // ================= CENTERS =================
      document.getElementById('centers-container').innerHTML =
        current.centers.map(c =>
          `<span class="px-3 py-1 bg-slate-100 rounded text-sm">${c}</span>`
        ).join('');

    });
};
</script>

</body>
</html>
