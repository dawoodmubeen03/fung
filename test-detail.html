<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Details | FUNGEP</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Space Grotesk', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    body { background: linear-gradient(135deg, #00adef 0%, #0076e5 100%); min-height: 100vh; font-family: 'Space Grotesk', sans-serif; }
    #bg-circles div { position: fixed; background: #ffffff; border-radius: 50%; pointer-events: none; animation: pulse 3s ease-in-out infinite alternate; }
    @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.08); } }
    .fade-up { animation: fadeInUp 0.6s ease-out both; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    .resource-badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        padding: 10px 18px;
        border-radius: 9999px;
        transition: all 0.3s ease;
        cursor: pointer;
    }
    .resource-badge:hover {
        border-color: #3b82f6;
        background: #eff6ff;
        transform: translateY(-2px);
    }
  </style>
</head>
<body class="flex items-start justify-center px-4 py-12 md:py-20">

  <div id="bg-circles" aria-hidden="true">
    <div style="width:300px;height:300px;opacity:.4;top:20%;left:-100px;animation-delay:0s"></div>
    <div style="width:600px;height:600px;opacity:.3;top:5%;left:-200px;animation-delay:.5s"></div>
  </div>

  <div class="fade-up relative z-10 w-full max-w-3xl bg-white rounded-[2.5rem] shadow-2xl overflow-hidden">

    <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-8 py-10 md:px-12">
        <div class="mb-6">
            <button onclick="window.history.back()"
            class="flex items-center gap-2 text-blue-100 hover:text-white text-xs font-bold uppercase tracking-widest transition-all">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
              Back
            </button>
        </div>
        <div class="text-left">
            <span class="text-blue-200 text-[10px] font-bold uppercase tracking-[0.25em] block mb-2">Entrance Test Details</span>
            <h1 id="test-name" class="text-3xl md:text-5xl font-black text-white tracking-tight leading-tight uppercase">
              Entry Test
            </h1>
        </div>
    </div>

    <div class="px-8 py-10 md:px-12 space-y-10">
      
      <section>
        <div class="flex flex-col md:flex-row md:items-center justify-between mb-4 gap-3 text-left">
            <h2 class="text-base font-black text-slate-900 flex items-center gap-2">
                <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs font-black flex items-center justify-center">1</span>
                Test Pattern
            </h2>
            <div id="neg-marking-badge" class="md:text-right"></div>
        </div>

        <div class="overflow-hidden border border-slate-100 rounded-2xl shadow-sm">
            <table class="w-full text-left text-xs md:text-sm">
                <thead class="bg-slate-50 text-slate-400 uppercase font-black">
                    <tr>
                        <th class="px-4 py-4 md:px-6">Subject</th>
                        <th class="px-4 py-4 md:px-6 text-center">MCQs</th>
                        <th class="px-4 py-4 md:px-6 text-center">Marks</th>
                    </tr>
                </thead>
                <tbody id="pattern-table-body" class="text-slate-600 divide-y divide-slate-100"></tbody>
                <tfoot class="bg-blue-50/50 font-black text-blue-600 border-t-2 border-blue-100">
                    <tr id="pattern-table-footer"></tr>
                </tfoot>
            </table>
        </div>
      </section>

      <div class="border-t border-slate-100"></div>

      <section class="text-left">
        <h2 class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs font-black flex items-center justify-center">2</span>
          Preparation Strategy
        </h2>
        <div class="p-5 bg-blue-50/50 rounded-2xl border border-blue-100">
            <p id="prep-guide" class="text-slate-700 text-sm leading-relaxed font-medium">Loading...</p>
        </div>
      </section>

      <div class="border-t border-slate-100"></div>

      <section class="text-left">
        <h2 class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs font-black flex items-center justify-center">3</span>
          Study Resources
        </h2>
        <div id="resource-container" class="flex flex-wrap gap-3"></div>
      </section>

      <div class="border-t border-slate-100"></div>

      <section class="text-left">
        <h2 class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs font-black flex items-center justify-center">4</span>
          Schedule (Annual Series)
        </h2>
        <div class="grid gap-3" id="dates-container"></div>
      </section>

      <div class="border-t border-slate-100"></div>

      <section class="text-left">
        <h2 class="text-base font-black text-slate-900 mb-4 flex items-center gap-2">
          <span class="w-6 h-6 rounded-full bg-blue-100 text-blue-600 text-xs font-black flex items-center justify-center">5</span>
          Test Centers
        </h2>
        <div class="flex flex-wrap gap-2" id="centers-container"></div>
      </section>

      <div class="pt-6">
        <button onclick="window.open('https://chat.whatsapp.com/IOPGMzbeoeKL1gdubz439B', '_blank')"
                class="w-full py-5 bg-blue-600 text-white rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:bg-blue-700 transition-all shadow-lg shadow-blue-500/30 active:scale-95">
            Join Prep Community
        </button>
      </div>

      <div class="text-center pt-2">
        <button onclick="window.history.back()" class="text-xs font-black uppercase tracking-widest text-slate-400 hover:text-blue-600 transition-all flex items-center justify-center gap-2 mx-auto">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
          Back to FUNGEP
        </button>
      </div>

    </div>
  </div>

  <script>
    let tests = [];

    // Load test data from JSON
    async function loadTestData() {
      try {
        const response = await fetch('/data/tests.json');
        const data = await response.json();
        tests = data.tests || data || [];
        console.log('✅ Tests loaded:', tests);
        initializeTestDetails();
      } catch (err) {
        console.error('❌ Error loading tests.json:', err);
        // Fallback to empty array
        tests = [];
        initializeTestDetails();
      }
    }

    function initializeTestDetails() {
      const params = new URLSearchParams(window.location.search);
      const idParam = params.get('id');
      const nameParam = params.get('name');

      const current = idParam
        ? tests.find(t => t.id === idParam)
        : nameParam
        ? tests.find(t => t.short === nameParam || t.name === nameParam)
        : tests[0];

      if (!current) {
        document.body.innerHTML = '<div class="flex items-center justify-center h-screen"><p class="text-2xl text-slate-600">Test not found</p></div>';
        return;
      }

      // ── Header ──────────────────────────────────────────────────────────────
      document.getElementById('test-name').innerText = current.name;

      // ── Pattern table ────────────────────────────────────────────────────
      let totalMcqs = 0, totalMarks = 0;
      document.getElementById('pattern-table-body').innerHTML = current.pattern.map(row => {
        totalMcqs  += row.mcqs;
        totalMarks += row.marks;
        return `<tr>
          <td class="px-4 py-4 md:px-6 font-bold text-slate-800">${row.subject}</td>
          <td class="px-4 py-4 md:px-6 text-center font-medium">${row.mcqs}</td>
          <td class="px-4 py-4 md:px-6 text-center font-bold text-blue-600">${row.marks}</td>
        </tr>`;
      }).join('');

      document.getElementById('pattern-table-footer').innerHTML =
        `<td class="px-4 py-4 md:px-6">Grand Total</td>
         <td class="px-4 py-4 md:px-6 text-center">${totalMcqs}</td>
         <td class="px-4 py-4 md:px-6 text-center">${totalMarks}</td>`;

      // ── Negative marking badge ────────────────────────────────────────────
      document.getElementById('neg-marking-badge').innerHTML = current.negativeMarking
        ? `<span class="px-3 py-1 bg-red-100 text-red-600 text-[10px] font-black rounded-full uppercase tracking-widest border border-red-200">Negative Marking: YES</span>`
        : `<span class="px-3 py-1 bg-green-100 text-green-600 text-[10px] font-black rounded-full uppercase tracking-widest border border-green-200">Negative Marking: NO</span>`;

      // ── Strategy ─────────────────────────────────────────────────────────
      document.getElementById('prep-guide').innerText = current.strategy;

      // ── Resources ────────────────────────────────────────────────────────
      const res = current.resources || {};
      document.getElementById('resource-container').innerHTML = [
        { label: "Past Papers", href: res.pastPapers || "#" },
        { label: "Guide Books", href: res.books || "#" },
        { label: "Notes",       href: res.notes  || "#" }
      ].map(r => `
        <a href="${r.href}" target="_blank" class="resource-badge group">
          <span class="text-[11px] font-black uppercase tracking-tight text-slate-600 group-hover:text-blue-600">${r.label}</span>
          <img src="https://upload.wikimedia.org/wikipedia/commons/1/12/Google_Drive_icon_%282020%29.svg" class="w-4 h-4" alt="Drive">
        </a>
      `).join('');

      // ── Annual Schedule ──────────────────────────────────────────────────
      document.getElementById('dates-container').innerHTML = current.annualSchedule.map(d => `
        <div class="bg-white rounded-2xl p-6 md:p-8 border border-slate-100 shadow-sm hover:shadow-md transition-all">
          <!-- Series Name (Large Bold Blue) -->
          <h3 class="text-2xl md:text-3xl font-black text-blue-600 mb-6 tracking-tight">
            ${d.series}
          </h3>
          
          <!-- Two Column Layout -->
          <div class="grid grid-cols-2 gap-6 md:gap-8">
            <!-- Left Column: Date Labels -->
            <div class="space-y-4">
              <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Registration Opens</p>
              </div>
              <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Deadline</p>
              </div>
              <div>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Test Date</p>
              </div>
            </div>
            
            <!-- Right Column: Actual Dates -->
            <div class="space-y-4">
              <div>
                <p class="text-sm md:text-base font-bold text-slate-800">${d.regStarts}</p>
              </div>
              <div>
                <p class="text-sm md:text-base font-bold text-slate-800">${d.deadline}</p>
              </div>
              <div>
                <p class="text-sm md:text-base font-bold text-blue-600">${d.testDate}</p>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      // ── Centers ──────────────────────────────────────────────────────────
      document.getElementById('centers-container').innerHTML = current.centers.map(c => `
        <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-[11px] font-bold rounded-lg border border-slate-200">${c}</span>
      `).join('');
    }

    // Load tests on page load
  
    window.addEventListener('DOMContentLoaded', loadTestData);
    </script>
</body>
</html>
