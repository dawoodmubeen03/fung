<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Test Details | FUNGEP</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: linear-gradient(135deg, #00adef 0%, #0076e5 100%);
      min-height: 100vh;
      font-family: sans-serif;
    }
  </style>
</head>

<body class="flex justify-center items-start py-10 px-4">

<div class="w-full max-w-3xl bg-white rounded-3xl shadow-2xl overflow-hidden">

  <!-- HEADER -->
  <div class="bg-blue-600 text-white p-8">
    <button onclick="history.back()" class="text-sm mb-4">← Back</button>
    <h1 id="test-name" class="text-3xl font-bold">Loading...</h1>
  </div>

  <!-- CONTENT -->
  <div class="p-8 space-y-10">

    <!-- PATTERN -->
    <div>
      <h2 class="font-bold mb-3">Test Pattern</h2>

      <table class="w-full text-sm border">
        <thead class="bg-gray-100">
          <tr>
            <th class="p-2 text-left">Subject</th>
            <th class="p-2">MCQs</th>
            <th class="p-2">Marks</th>
          </tr>
        </thead>

        <tbody id="pattern-body"></tbody>
        <tfoot id="pattern-footer" class="bg-blue-50 font-bold"></tfoot>
      </table>

      <div id="neg-badge" class="mt-3"></div>
    </div>

    <!-- STRATEGY -->
    <div>
      <h2 class="font-bold mb-2">Preparation Strategy</h2>
      <p id="strategy"></p>
    </div>

    <!-- SCHEDULE -->
    <div>
      <h2 class="font-bold mb-2">Schedule</h2>
      <div id="schedule"></div>
    </div>

    <!-- CENTERS -->
    <div>
      <h2 class="font-bold mb-2">Centers</h2>
      <div id="centers" class="flex flex-wrap gap-2"></div>
    </div>

  </div>

</div>

<script>

fetch('data/tests.json')
.then(res => res.json())
.then(data => {

  const params = new URLSearchParams(window.location.search);
  const testId = params.get('id') || "net-nust";

  const test = data.tests.find(t => t.id === testId) || data.tests[0];

  // TITLE
  document.getElementById('test-name').innerText = test.name;

  // PATTERN
  let totalM = 0, totalMarks = 0;

  document.getElementById('pattern-body').innerHTML =
    test.pattern.map(p => {
      totalM += p.mcqs;
      totalMarks += p.marks;

      return `
        <tr>
          <td class="p-2">${p.subject}</td>
          <td class="p-2 text-center">${p.mcqs}</td>
          <td class="p-2 text-center">${p.marks}</td>
        </tr>
      `;
    }).join('');

  document.getElementById('pattern-footer').innerHTML = `
    <tr>
      <td class="p-2">Total</td>
      <td class="p-2 text-center">${totalM}</td>
      <td class="p-2 text-center">${totalMarks}</td>
    </tr>
  `;

  // NEGATIVE MARKING
  document.getElementById('neg-badge').innerHTML =
    test.negativeMarking
      ? `<span class="text-red-600 font-bold">Negative Marking: YES</span>`
      : `<span class="text-green-600 font-bold">Negative Marking: NO</span>`;

  // STRATEGY
  document.getElementById('strategy').innerText = test.strategy;

  // SCHEDULE
  document.getElementById('schedule').innerHTML =
    test.annualSchedule.map(s => `
      <div class="border p-3 rounded mb-2">
        <b>${s.series}</b><br>
        Start: ${s.regStarts} | Deadline: ${s.deadline} | Test: ${s.testDate}
      </div>
    `).join('');

  // CENTERS
  document.getElementById('centers').innerHTML =
    test.centers.map(c => `
      <span class="px-3 py-1 bg-gray-100 rounded">${c}</span>
    `).join('');

});

</script>

</body>
</html>
