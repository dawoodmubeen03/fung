<script>
    window.onload = () => {
        // 1. Get Test name from URL
        const params = new URLSearchParams(window.location.search);
        const testShortName = params.get('name') || "NET";
        
        // 2. Your JSON Data
        const testData = [
            {
                "id": "net-nust",
                "name": "NUST Entry Test",
                "short": "NET",
                "negativeMarking": false,
                "pattern": [
                    { "subject": "Mathematics", "mcqs": 80, "marks": 80 },
                    { "subject": "Physics", "mcqs": 60, "marks": 60 },
                    { "subject": "Chemistry/CS", "mcqs": 30, "marks": 30 },
                    { "subject": "English", "mcqs": 20, "marks": 20 },
                    { "subject": "Intelligence", "mcqs": 10, "marks": 10 }
                ],
                "strategy": "Focus on PTB books. Speed and practice are key.",
                "annualSchedule": [
                    { "series": "NET-1", "regStarts": "Dec", "deadline": "Jan", "testDate": "Feb" },
                    { "series": "NET-2", "regStarts": "Feb", "deadline": "Mar", "testDate": "Apr" },
                    { "series": "NET-3", "regStarts": "Apr", "deadline": "May", "testDate": "Jun" },
                    { "series": "NET-4", "regStarts": "May", "deadline": "Jun", "testDate": "Jul" }
                ],
                "centers": ["Islamabad", "Karachi", "Quetta", "Gilgit"]
            },
            {
                "id": "fast-nu",
                "name": "FAST Entry Test",
                "short": "FAST",
                "negativeMarking": true,
                "pattern": [
                    { "subject": "Basic Math", "mcqs": 50, "marks": 50 },
                    { "subject": "Advanced Math", "mcqs": 50, "marks": 50 },
                    { "subject": "English", "mcqs": 30, "marks": 30 },
                    { "subject": "IQ", "mcqs": 20, "marks": 20 }
                ],
                "strategy": "Avoid guessing. Negative marking present.",
                "annualSchedule": [
                    { "series": "Admission Test", "regStarts": "May", "deadline": "Jun", "testDate": "Jul" }
                ],
                "centers": ["Lahore", "Islamabad", "Karachi"]
            },
            {
                "id": "itu",
                "name": "ITU Admission Test",
                "short": "ITU",
                "negativeMarking": false,
                "pattern": [
                    { "subject": "Math", "mcqs": 70, "marks": 70 },
                    { "subject": "English", "mcqs": 30, "marks": 30 }
                ],
                "strategy": "Focus on logic + math basics.",
                "annualSchedule": [
                    { "series": "Fall Intake", "regStarts": "May", "deadline": "Jun", "testDate": "Jul" }
                ],
                "centers": ["Lahore"]
            },
            {
                "id": "pieas",
                "name": "PIEAS Entry Test",
                "short": "PIEAS",
                "negativeMarking": true,
                "pattern": [
                    { "subject": "Mathematics", "mcqs": 60, "marks": 60 },
                    { "subject": "Physics", "mcqs": 60, "marks": 60 },
                    { "subject": "Chemistry", "mcqs": 30, "marks": 30 }
                ],
                "strategy": "Strong conceptual preparation required.",
                "annualSchedule": [
                    { "series": "Admission Test", "regStarts": "Apr", "deadline": "Jun", "testDate": "Jul" }
                ],
                "centers": ["Islamabad", "Karachi", "Lahore"]
            },
            {
                "id": "nts-nat",
                "name": "NTS NAT Test",
                "short": "NAT",
                "negativeMarking": false,
                "pattern": [
                    { "subject": "Verbal", "mcqs": 30, "marks": 30 },
                    { "subject": "Quantitative", "mcqs": 30, "marks": 30 },
                    { "subject": "Analytical", "mcqs": 30, "marks": 30 }
                ],
                "strategy": "Monthly test. Focus on basic concepts.",
                "annualSchedule": [
                    { "series": "Monthly Test", "regStarts": "Monthly", "deadline": "Varies", "testDate": "Monthly" }
                ],
                "centers": ["Nationwide"]
            }
        ];

        // 3. Find the current test based on URL param
        const current = testData.find(t => t.short === testShortName) || testData[0];
        document.getElementById('test-name').innerText = current.name;

        // 4. Render Pattern Table
        let totalM = 0, totalP = 0;
        document.getElementById('pattern-table-body').innerHTML = current.pattern.map(i => {
            totalM += i.mcqs; totalP += i.marks;
            return `<tr><td class="px-4 py-4 md:px-6 font-bold text-slate-800">${i.subject}</td><td class="text-center font-medium">${i.mcqs}</td><td class="text-center font-bold text-blue-600">${i.marks}</td></tr>`;
        }).join('');
        
        document.getElementById('pattern-table-footer').innerHTML = `<td class="px-4 py-4 md:px-6">Grand Total</td><td class="text-center">${totalM}</td><td class="text-center">${totalP}</td>`;

        // 5. Render Negative Marking Badge
        document.getElementById('neg-marking-badge').innerHTML = current.negativeMarking 
            ? `<span class="px-3 py-1 bg-red-100 text-red-600 text-[10px] font-black rounded-full uppercase tracking-widest border border-red-200">Negative Marking: YES</span>`
            : `<span class="px-3 py-1 bg-green-100 text-green-600 text-[10px] font-black rounded-full uppercase tracking-widest border border-green-200">Negative Marking: NO</span>`;

        // 6. Render Schedule Cards
        document.getElementById('dates-container').innerHTML = current.annualSchedule.map(d => {
            const formatD = (m) => m === "Monthly" || m === "Varies" ? m : `15 ${m}, 2026`;
            return `
            <div class="flex items-center justify-between p-5 bg-slate-50 rounded-xl border border-slate-100">
                <div class="text-left">
                    <p class="text-3xl font-black text-blue-600 uppercase tracking-tighter leading-none">${d.series}</p>
                </div>
                <div class="text-right space-y-2">
                    <div>
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Registrations Start</p>
                        <p class="text-xs font-bold text-slate-500">${formatD(d.regStarts)}</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Test Date</p>
                        <p class="text-sm font-bold text-slate-500">${formatD(d.testDate)}</p>
                    </div>
                    <div>
                        <p class="text-[9px] text-slate-400 font-black uppercase tracking-widest">Deadline</p>
                        <p class="text-xs font-bold text-slate-500">${formatD(d.deadline)}</p>
                    </div>
                </div>
            </div>`;
        }).join('');

        // 7. Render Centers
        document.getElementById('centers-container').innerHTML = current.centers.map(c => `
            <span class="px-3 py-1.5 bg-slate-100 text-slate-600 text-[11px] font-bold rounded-lg border border-slate-200">${c}</span>
        `).join('');

        // 8. Strategy
        document.getElementById('prep-guide').innerText = current.strategy;
    };
</script>
