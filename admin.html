    // ============= AUTH =============
async function adminGoogleLogin() {
  const provider = new firebase.auth.GoogleAuthProvider();

  const result = await auth.signInWithPopup(provider);
  const uid = result.user.uid;

  const doc = await db.collection('admins').doc(uid).get();

  if (!doc.exists) {
    await auth.signOut();
    document.getElementById('admin-login-error').classList.remove('hidden');
    return;
  }

  document.getElementById('admin-user-name').innerText =
    result.user.displayName;

  document.getElementById('admin-login').classList.add('hidden');
  document.getElementById('admin-dashboard').classList.remove('hidden');

  loadPendingMCQs();
  loadPendingReviews();
  loadAnalyticsStats();
}

    function adminLogout() {
      auth.signOut().then(() => {
        document.getElementById('admin-login').classList.remove('hidden');
        document.getElementById('admin-dashboard').classList.add('hidden');
      });
    }

 auth.onAuthStateChanged(async user => {
  if (!user) return;

  const doc = await db.collection('admins')
    .doc(user.uid)
    .get();

  if (!doc.exists) {

    return;
  }

  document.getElementById('admin-user-name').innerText =
    user.displayName;

  document.getElementById('admin-login').classList.add('hidden');
  document.getElementById('admin-dashboard').classList.remove('hidden');

  loadPendingMCQs();

   loadAnalyticsStats();
});

    // ============= TABS =============
function switchTab(tab) {
  const tabs = ['mcqs', 'reviews', 'approved-mcqs', 'approved-reviews', 'notifications'];
  tabs.forEach(t => {
    document.getElementById(`tab-${t}`).classList.toggle('hidden', t !== tab);
    const btn = document.getElementById(`tab-${t}-btn`);
    if (btn) {
      btn.classList.toggle('text-blue-600', t === tab);
      btn.classList.toggle('border-blue-600', t === tab);
      btn.classList.toggle('text-slate-400', t !== tab);
      btn.classList.toggle('border-transparent', t !== tab);
    }
  });
  if (tab === 'approved-mcqs') loadApprovedMCQs();
  if (tab === 'approved-reviews') loadApprovedReviews();
  if (tab === 'notifications') loadAdminNotifications();
}

    // ============= APPROVE / REJECT =============
 async function approveItem(collection, id, btn) {

  btn.disabled = true;
  btn.innerText = '✓';

  try {
    await db.collection(collection).doc(id).update({ status: 'approved' });

    btn.closest('.shadow-xl').remove();

    document.getElementById('stat-approved').innerText =
      parseInt(document.getElementById('stat-approved').innerText) + 1;

    document.getElementById('stat-pending').innerText =
      parseInt(document.getElementById('stat-pending').innerText) - 1;

  } catch(e) {
    console.error(e);
  }
}

 async function rejectItem(collection, id, btn) {

  btn.disabled = true;
  btn.innerText = '✕';

  try {
    await db.collection(collection).doc(id).update({ status: 'rejected' });

    btn.closest('.shadow-xl').remove();

    document.getElementById('stat-pending').innerText =
      parseInt(document.getElementById('stat-pending').innerText) - 1;

  } catch(e) {
    console.error(e);
  }
}

async function loadAnalyticsStats() {

  const mcqsSnap = await db.collection('mcqs').get();
  const reviewsSnap = await db.collection('reviews').get();

  const approvedMCQs = mcqsSnap.docs.filter(d => d.data().status === 'approved').length;
  const approvedReviews = reviewsSnap.docs.filter(d => d.data().status === 'approved').length;

  const pendingMCQs = mcqsSnap.docs.filter(d => d.data().status === 'pending').length;
  const pendingReviews = reviewsSnap.docs.filter(d => d.data().status === 'pending').length;

  document.getElementById('stat-total-mcqs').innerText = approvedMCQs;
  document.getElementById('stat-total-reviews').innerText = approvedReviews;

  document.getElementById('stat-pending').innerText = pendingMCQs + pendingReviews;
  document.getElementById('stat-approved').innerText = approvedMCQs + approvedReviews;
}

    
function animateBackground() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  circles.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.radius, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(37, 99, 235, 0.15)";
    ctx.fill();

    c.x += c.dx;
    c.y += c.dy;

    if (c.x < 0 || c.x > canvas.width) c.dx *= -1;
    if (c.y < 0 || c.y > canvas.height) c.dy *= -1;
  });

  requestAnimationFrame(animateBackground);
}

animateBackground();

window.addEventListener("resize", () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

    async function refreshDashboard() {

  const btn = document.getElementById('refresh-btn');
  btn.innerText = 'Refreshing...';
  btn.disabled = true;

  try {
    await Promise.all([
      loadPendingMCQs(),
      loadPendingReviews(),
      loadAnalyticsStats()
    ]);

    // Only refresh approved if currently visible
    if (!document.getElementById('tab-approved-mcqs').classList.contains('hidden'))
      await loadApprovedMCQs();

    if (!document.getElementById('tab-approved-reviews').classList.contains('hidden'))
      await loadApprovedReviews();

  } catch (e) {
    console.error(e);
  }

  btn.innerText = '🔄 Refresh';
  btn.disabled = false;
}

async function sendNotification() {
  const title = document.getElementById('notif-title').value.trim();
  const body = document.getElementById('notif-body').value.trim();
  const link = document.getElementById('notif-link').value.trim();

  if (!title || !body) {
    alert("Title and message required");
    return;
  }

  try {
    // 1️⃣ Save in Firestore
    const docRef = await db.collection('notifications').add({
      title,
      body,
      link: link || "",
      createdAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    console.log("Saved:", docRef.id);

    // 2️⃣ CALL YOUR SERVER (for push)
    await fetch("http://localhost:3000/sendNotification", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        title,
        body,
        link
      })
    });

    document.getElementById('notif-success').classList.remove('hidden');

  } catch (e) {
    console.error("Error:", e);
    alert("Failed to send notification");
  }
}
    
async function loadAdminNotifications() {
  const container = document.getElementById('notif-list');
  container.innerHTML = '<p class="text-slate-400 text-center py-8">Loading...</p>';

  const snap = await db.collection('notifications')
    .orderBy('createdAt', 'desc')
    .get();

  container.innerHTML = '';

  if (snap.empty) {
    container.innerHTML = '<p class="text-slate-400 text-center py-8 font-bold">No notifications sent yet.</p>';
    return;
  }

  snap.forEach(doc => {
    const n = doc.data();
    const date = new Date(n.createdAt).toLocaleDateString('en-PK', {
      day: 'numeric', month: 'short', year: 'numeric'
    });

    container.innerHTML += `
      <div class="bg-white/90 backdrop-blur-xl border border-slate-200 rounded-3xl p-6 shadow-xl">
        <div class="flex justify-between items-start mb-2">
          <h4 class="font-bold text-slate-900">${n.title}</h4>
          <span class="text-xs text-slate-400 font-bold">${date}</span>
        </div>
        <p class="text-slate-600 text-sm">${n.body}</p>
        ${n.link ? `<a href="${n.link}" target="_blank" class="text-xs text-blue-500 font-bold mt-1 block">${n.link}</a>` : ''}
        <button onclick="deleteNotification('${doc.id}', this)"
          class="mt-4 w-full py-3 bg-red-100 text-red-500 rounded-xl font-bold hover:bg-red-200 transition-all text-sm">
          🗑 Delete
        </button>
      </div>
    `;
  });
}

async function deleteNotification(id, btn) {
  btn.disabled = true;
  btn.innerText = 'Deleting...';
  await db.collection('notifications').doc(id).delete();
  btn.closest('.shadow-xl').remove();
}
